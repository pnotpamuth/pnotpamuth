<svg width="100%" height="240" viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0fffc1"></stop>
<stop offset="100%" stop-color="#7a00ff"></stop>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
<feMerge>
<feMergeNode in="blur"></feMergeNode>
<feMergeNode in="SourceGraphic"></feMergeNode>
</feMerge>
</filter>

<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff10" stroke-width="1"></path>
</pattern>

</defs>

<!-- háttér -->
<rect width="100%" height="100%" fill="#050505"></rect>

<!-- animált hullám -->
<path d="M0 130 Q250 70 500 130 T1000 130 V240 H0 Z" fill="url(#bggrad)" opacity="0.5">
<animate attributeName="d" dur="6s" repeatCount="indefinite" values="
M0 130 Q250 70 500 130 T1000 130 V240 H0 Z;
M0 120 Q250 150 500 120 T1000 140 V240 H0 Z;
M0 130 Q250 70 500 130 T1000 130 V240 H0 Z
"></animate>
</path>

<!-- grid -->
<rect width="100%" height="100%" fill="url(#grid)"></rect>

<!-- typing text -->
<text x="50%" y="55%" text-anchor="middle" font-size="64" font-family="Fira Code, monospace" fill="white" filter="url(#glow)">

<tspan id="t1">M
<animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"></animate>
</tspan>

<tspan id="t2">A
<animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" begin="0.3s"></animate>
</tspan>

<tspan id="t3">M
<animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" begin="0.6s"></animate>
</tspan>

<tspan id="t4">U
<animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" begin="0.9s"></animate>
</tspan>

<tspan id="t5">T
<animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" begin="1.2s"></animate>
</tspan>

</text>

</svg>