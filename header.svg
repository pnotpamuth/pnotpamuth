<svg width="100%" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0fffc1"></stop>
      <stop offset="100%" stop-color="#7a00ff"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- háttér -->
  <rect width="100%" height="100%" fill="black"></rect>

  <!-- hullám -->
  <path d="M0 120 Q250 60 500 120 T1000 120 V220 H0 Z" fill="url(#grad)" opacity="0.5"></path>

  <!-- szöveg -->
  <text x="50%" y="55%" text-anchor="middle" font-size="60" font-family="Fira Code, monospace" fill="white" filter="url(#glow)">

    <tspan>M</tspan>
    <tspan opacity="0">
      A
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.3s" fill="freeze"></animate>
    </tspan>
    <tspan opacity="0">
      M
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.6s" fill="freeze"></animate>
    </tspan>
    <tspan opacity="0">
      U
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.9s" fill="freeze"></animate>
    </tspan>
    <tspan opacity="0">
      T
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"></animate>
    </tspan>

  </text>

</svg>